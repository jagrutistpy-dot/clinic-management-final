<div class="card">
  <h2>Billing</h2>

  <input id="billing-patient-id" placeholder="Patient ID">
  <input id="billing-doctor" placeholder="Doctor Attender">
  <input id="billing-amount" type="number" placeholder="Amount">
  <input id="billing-date" type="date" placeholder="Bill Date">

  <button id="add-billing-btn">Add Bill</button>

  <table>
    <thead>
      <tr>
        <th>Patient ID</th>
        <th>Doctor Attender</th>
        <th>Amount</th>
        <th>Bill Date</th>
      </tr>
    </thead>
    <tbody id="billing-table-body"></tbody>
  </table>
</div>
