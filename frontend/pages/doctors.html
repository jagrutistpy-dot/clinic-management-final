<div class="card">
  <h2>Doctors</h2>

  <input id="doctor-name" placeholder="Doctor Name">
  <input id="doctor-specialization" placeholder="Specialization">
  <input id="doctor-schedule" placeholder="Schedule (e.g. Mon–Fri 9AM–5PM)">
  <input id="doctor-contact" placeholder="Contact">

  <button id="add-doctor-btn">Add Doctor</button>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Specialization</th>
        <th>Schedule</th>
        <th>Contact</th>
      </tr>
    </thead>
    <tbody id="doctor-table-body"></tbody>
  </table>
</div>
